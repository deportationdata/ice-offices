name: "Scrape ICE offices"

on:
  schedule:
    - cron: '0 5 * * *' # every day at 05:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:

  scrape:
    runs-on: [self-hosted]

    env:
      RENV_PATHS_CACHE: ~/renv-cache

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Save current offices snapshot
        run: cp data/ice-offices.feather /tmp/old-ice-offices.feather

      - name: Restore renv library
        run: |
          Rscript -e "
            renv::hydrate(sources = '~/R/aarch64-unknown-linux-gnu-library/4.5')
            renv::restore()
          "

      - name: Run scraper
        run: Rscript code/offices-scraper.R

      - name: Check for changes
        id: check_changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git checkout -b offices-update-$(date +%Y-%m-%d)
          git add data/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Check if any open PR already contains these files
          changed_files=$(git diff --cached --name-only)
          open_prs=$(gh pr list --state open --json number --jq '.[].number')
          for pr in $open_prs; do
            pr_files=$(gh pr view "$pr" --json files --jq '.files[].path')
            for file in $changed_files; do
              if echo "$pr_files" | grep -qF "$file"; then
                echo "File '$file' already present in open PR #$pr — skipping."
                echo "changed=false" >> $GITHUB_OUTPUT
                exit 0
              fi
            done
          done

          # Generate change summary comparing old vs new offices
          Rscript -e "
            suppressPackageStartupMessages({
              library(arrow)
              library(dplyr)
            })

            old <- read_feather('/tmp/old-ice-offices.feather')
            new <- read_feather('data/ice-offices.feather')

            added   <- setdiff(new\$office_name, old\$office_name)
            removed <- setdiff(old\$office_name, new\$office_name)

            # Check for modified details in offices present in both
            common <- intersect(new\$office_name, old\$office_name)
            key_cols <- setdiff(names(new), 'office_name')

            modified_lines <- unlist(lapply(common, function(nm) {
              o <- old |> filter(office_name == nm) |> select(any_of(key_cols)) |> slice(1)
              n <- new |> filter(office_name == nm) |> select(any_of(key_cols)) |> slice(1)
              if (identical(o, n)) return(NULL)
              diffs <- unlist(lapply(key_cols, function(col) {
                ov <- as.character(o[[col]])
                nv <- as.character(n[[col]])
                if (!identical(ov, nv)) paste0('  - ', col, ': `', ov, '` -> `', nv, '`')
              }))
              c(paste0('- **', nm, '**'), diffs)
            }))

            lines <- character(0)
            if (length(added) > 0) {
              lines <- c(lines, paste0('**', length(added), ' office(s) added:**'))
              lines <- c(lines, paste0('- ', added))
              lines <- c(lines, '')
            }
            if (length(removed) > 0) {
              lines <- c(lines, paste0('**', length(removed), ' office(s) removed:**'))
              lines <- c(lines, paste0('- ', removed))
              lines <- c(lines, '')
            }
            if (length(modified_lines) > 0) {
              n_modified <- sum(startsWith(modified_lines, '- **'))
              lines <- c(lines, paste0('**', n_modified, ' office(s) with modified details:**'))
              lines <- c(lines, modified_lines)
              lines <- c(lines, '')
            }
            if (length(lines) == 0) {
              writeLines('NO_REAL_CHANGES', '/tmp/office-changes.txt')
            } else {
              writeLines(lines, '/tmp/office-changes.txt')
            }
          "

          # If binary files changed but data content is identical, discard and skip
          if grep -qF 'NO_REAL_CHANGES' /tmp/office-changes.txt; then
            echo "Binary files differ but data content is identical — skipping."
            git reset HEAD -- data/
            git checkout -- data/
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Update offices data [skip ci]"
          git push --set-upstream origin HEAD

      - name: Create pull request
        if: steps.check_changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "Automated update: changes detected in ICE offices data."
            echo ""
            cat /tmp/office-changes.txt
          } > /tmp/pr-body.txt

          gh pr create \
            --title "Offices update $(date +%Y-%m-%d)" \
            --body-file /tmp/pr-body.txt \
            --reviewer graemeblair \
            --base main
